# Базовый compose-файл. Запускается совместно с docker-compose.dev.yml
# или docker-compose.prod.yml через Makefile (`make dev` / `make prod`).

name: ${COMPOSE_PROJECT_NAME:-project_work2}

networks:
  edge:
    name: ${COMPOSE_PROJECT_NAME:-project_work2}_edge
  internal:
    name: ${COMPOSE_PROJECT_NAME:-project_work2}_internal
    internal: true

volumes:
  postgres_data:
  strapi_uploads:
  traefik_acme:

services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    networks:
      - edge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    labels:
      - traefik.enable=true

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # Strapi 5. Собирается из apps/backend. Dockerfile выбирается оверрайдом.
    environment:
      NODE_ENV: ${NODE_ENV}
      HOST: ${STRAPI_HOST}
      PORT: ${STRAPI_PORT}
      URL: ${STRAPI_URL}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL}
    volumes:
      - strapi_uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-project_work2}_edge
      - traefik.http.services.backend.loadbalancer.server.port=${STRAPI_PORT}

  frontend:
    # Nuxt 4. Собирается из apps/frontend. Dockerfile выбирается оверрайдом.
    environment:
      NODE_ENV: ${NODE_ENV}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_SECRET: ${NUXT_API_SECRET}
    depends_on:
      - backend
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-project_work2}_edge
      - traefik.http.services.frontend.loadbalancer.server.port=3000
